version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nse_scanner_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: nse_scanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: redis:alpine
    container_name: nse_scanner_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          memory: 32M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nse_scanner_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/nse_scanner
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
      FYERS_APP_ID: "${FYERS_APP_ID}"
      FYERS_SECRET_ID: "${FYERS_SECRET_ID}"
      FYERS_REDIRECT_URI: "${FYERS_REDIRECT_URI}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN}"
      DATA_DIR: "/app/data"
      SECRET_KEY: "${SECRET_KEY}"
      SETTINGS_PIN: "${SETTINGS_PIN}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nse_scanner_frontend
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          memory: 32M

volumes:
  pgdata:
