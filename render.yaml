services:
  # 1. FastAPI Backend (Docker Web Service)
  - type: web
    name: nse-momentum-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nse-momentum-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: nse-momentum-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SETTINGS_PIN
        value: "4589"
      - key: ALLOWED_ORIGIN
        value: https://nse-momentum-frontend.onrender.com

  # 2. React Vite Frontend (Static Site)
  - type: web
    name: nse-momentum-frontend
    runtime: static
    plan: free
    buildCommand: npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://nse-momentum-backend.onrender.com/api/v1

databases:
  # 3. PostgreSQL Database
  - name: nse-momentum-db
    plan: free
    postgresMajorVersion: "15"

interfaces:
  # 4. Redis Cache
  - type: redis
    name: nse-momentum-redis
    plan: free
    ipAllowList: [] # Private access only
